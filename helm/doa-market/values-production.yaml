# Production environment overrides

global:
  environment: production
  domain: doa-market.com
  registry: 478266318018.dkr.ecr.ap-northeast-2.amazonaws.com

# Production resource limits (optimized for initial deployment)
defaults:
  replicaCount: 1

  # Image pull policy (Always for production to ensure latest images)
  image:
    pullPolicy: Always

  # Ingress configuration for AWS ALB
  ingress:
    enabled: true
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      alb.ingress.kubernetes.io/healthcheck-path: /health
      alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
      alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
      alb.ingress.kubernetes.io/healthy-threshold-count: '2'
      alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
      cert-manager.io/cluster-issuer: ''  # Disable cert-manager for HTTP-only ALB
      nginx.ingress.kubernetes.io/ssl-redirect: 'false'  # Disable SSL redirect

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  service:
    type: ClusterIP
    port: 80

  # Pod Disruption Budget (고가용성 보장)
  # Replica 1개일 때는 비활성화
  podDisruptionBudget:
    enabled: false
    maxUnavailable: 1  # 동시에 1개 Pod만 중단 가능

  # Spot Instance 설정
  spotEnabled: true
  tolerations:
    - key: spot
      operator: Equal
      value: "true"
      effect: NoSchedule

  # Node Affinity (Spot 선호)
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: eks.amazonaws.com/capacityType
              operator: In
              values:
                - SPOT
      - weight: 20
        preference:
          matchExpressions:
            - key: eks.amazonaws.com/capacityType
              operator: In
              values:
                - ON_DEMAND

